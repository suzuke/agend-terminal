# GitLab CI — mirrors core GitHub Actions CI jobs for use as backup
# when GitHub Actions is degraded. See docs/GITLAB-MIRROR-SETUP.md.
#
# Coverage: Linux only (shared runners). macOS/Windows are deferred
# to GitHub Actions — add tagged runners if cross-platform GitLab CI
# is needed in the future.

image: rust:latest

stages:
  - lint
  - test

variables:
  CARGO_TERM_COLOR: always

# Cache cargo registry + build artifacts across jobs.
cache:
  key: "${CI_COMMIT_REF_SLUG}"
  paths:
    - target/
    - .cargo/registry/
    - .cargo/git/

before_script:
  - rustup component add rustfmt clippy
  - apt-get update -qq && apt-get install -y -qq libgtk-3-dev libayatana-appindicator3-dev libxdo-dev

fmt:
  stage: lint
  script:
    # task83 (d-46): shared owned-source formatter surface — same script GitHub CI
    # and scripts/preflight.sh call (owned *.rs, vendor/ excluded, NUL-safe).
    - scripts/fmt-owned.sh --check

clippy:
  stage: lint
  script:
    # task83: GitHub's explicit OWNED-target clippy (not `--all-targets`, which
    # drags in the vendored agentic-git bin under our strict `-D warnings`).
    - cargo clippy --lib --bin agend-terminal --bin agend-git --bin agend-mcp-bridge --tests --examples --features tray -- -D warnings

test:
  stage: test
  variables:
    AGEND_LOCK_AUDIT: "1"
  script:
    - cargo test --tests --features tray
