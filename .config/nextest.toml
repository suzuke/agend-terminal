# #1784: instrument the fleet-wide CI hang hunt.
#
# A real `Command::new("git")` test (worktree_cleanup / branch_sweep build real
# repos + worktrees) intermittently HANGS, timing the whole CI job out at ~30min
# with NO attribution — `cargo test` prints a test's name only on COMPLETION, so
# a hung test is anonymous in the log (which also never finalizes on a job
# timeout).
#
# #1893: ALL platforms now run the Tests step via nextest with this `ci` profile
# (previously windows-only; mac/ubuntu used bare `cargo test` and so ran a hung
# test to the 30-min STEP timeout, anonymous). It keeps the default parallelism
# but any test still running past the slow-timeout is KILLED and NAMED — a fast,
# attributed failure instead of a mystery hang.
[profile.ci]
# Warn (mark SLOW) at 60s; SIGKILL the test after 2 periods (120s). Normal tests
# finish in well under a second; a real-git test that takes >120s is wedged.
slow-timeout = { period = "60s", terminate-after = 2 }

# build_provenance_version tests run nested `cargo build` (real git init + fixture
# compilation). On Windows CI runners the nested build is 2-3× slower — give it
# 2× the normal headroom so slow-timeout doesn't false-kill it.
[[profile.ci.overrides]]
filter = 'test(/build_provenance_version::/)'
slow-timeout = { period = "120s", terminate-after = 3 }

# Surface the terminated/hung test prominently in the run summary.
failure-output = "immediate-final"
final-status-level = "slow"

# #1893: serialize the heavy real-git / worktree / subprocess test cluster.
# These tests spawn real `git` (worktree add / branch / fetch) and share
# filesystem + `.git/index.lock` state; at full parallelism they race (index.lock
# contention, fd pressure) → intermittent hangs/failures (RC1/RC3 of the #1893
# spike; e.g. `mcp::handlers::ci::tests::checkout_bind_true_concurrent_branch_
# create_race_idempotent` passes in isolation but fails under load). max-threads=1
# runs the GROUP one-at-a-time (isolation-equivalent) while the rest of the suite
# stays parallel. The override is mirrored under both `default` (local runs) and
# `ci` (CI runs) profiles.
#
# The filter has two parts (reviewer-2 #1896: cover the FULL real-git set, but
# don't drag pure-logic tests into max-threads=1):
#  1. anchored MODULE prefixes — modules that are predominantly real-git/worktree
#     /subprocess: worktree (src/worktree.rs lifecycle tests build real worktrees
#     via the #2128 bounded-git_cmd add path), worktree_pool, worktree_cleanup
#     (CR-2026-06-14: real clone/fetch repro joins its sibling real-git tests),
#     admin (worktree + cleanup_zombies process spawn),
#     mcp::handlers::{ci,dispatch_hook,force_release,worktree,p0b_tests},
#     daemon::{retention::worktrees,pr_state,auto_release,conflict_notify,
#     per_tick::tmp_review_gc}, bootstrap::{agent_resolve,canonical_hygiene}.
#  2. NAMED tests in otherwise-pure modules (messaging 2/47, tasks::tests 1/78,
#     task_sweep `closes_markers_…` + `resolve_sweep_boards_pairs_…_2117_p2`
#     [#2117 P2: builds 2 real git repos for the per-board sweep enumeration],
#     mcp::handlers::tests checkout_repo_*) — targeted by name so the ~200
#     pure-logic tests around them stay parallel.
[test-groups]
git-subprocess = { max-threads = 1 }

# #2549-flake (t-20260702161319112091-56872-10, 7-sample pattern-ready class):
# on Windows runners this SAME real-git cluster intermittently fails at the
# process-spawn/DLL-init layer, not the test's own logic — misjudged merge-
# state, an outright hang, and (2026-07-03, main @ 22068ef1) an ABORT
# 0xc0000142 "DLL initialization routine failed" 0.008s into the test, with
# the other 4861 tests in the same run passing clean. Every sampled failure
# resolved on a bare rerun with NO code change — the signature of a
# runner-environment race (antivirus/DLL-load contention is a well-known
# 0xc0000142 cause), not a real regression. `retries = 2` gives this SAME
# already-scoped `git-subprocess` group (both overrides below — the filter
# is untouched) up to 2 automatic reruns on failure, CI-profile only (the
# `default` profile below stays retry-free: a local dev re-running a
# genuinely-broken test by hand should still see it fail every time).
# Deliberately NOT a suite-wide `retries` at `[profile.ci]` level — masking a
# REAL regression is the risk this must not create, so retry only applies to
# the test filter already carved out for infra-flake-prone real-git spawns;
# every other test in the suite still fails on the first try. A genuinely
# broken test in this filter also stays broken across retries (they don't
# change inputs or fix code) — the 3 failure retries only rescue outcomes
# that a bare rerun already proved were transient.
#
# `*_stress_50_iter_*` do 50 real git branch-creates (~60s locally, slower on CI
# runners). Listed FIRST so its slow-timeout wins for them: give 3×120s headroom
# so the suite-wide 120s terminate-after can't FALSE-kill a genuinely-slow (not
# wedged) stress run on a slow runner — they still join the serial group + still
# get a generous wedge cap. (mac/ubuntu had NO per-test timeout before #1893, so
# this preserves their pass behaviour while gaining the hang guard.)
[[profile.ci.overrides]]
filter = 'test(/_stress_50_iter_/)'
test-group = 'git-subprocess'
slow-timeout = { period = "120s", terminate-after = 3 }
retries = 2

[[profile.ci.overrides]]
filter = 'test(/(^(worktree|worktree_pool|worktree_cleanup|admin|mcp::handlers::(ci|dispatch_hook|force_release|worktree|p0b_tests)|daemon::(retention::worktrees|pr_state|auto_release|conflict_notify|per_tick::tmp_review_gc)|bootstrap::(agent_resolve|canonical_hygiene))::|checkout_repo_|dispatch_branch_skips_metadata_stub|send_with_branch_checkout_failure|task_done_cleans_post_lease|closes_markers_extract_cleanly_from_actual_main|resolve_sweep_boards_pairs_each_project_with_its_own_repo_2117_p2|shim_denies_agent_bypass_canonical_provisioning_2234|denylist_[a-z_]+_(2379|2390)|tracked_tree_[a-z_]+_2379|resolve_default_branch_base_[a-z_]+_2390)/)'
test-group = 'git-subprocess'
retries = 2

# Local `default` profile has no terminate-after, so no false-kill risk — just
# serialize the same cluster for parity with CI.
[[profile.default.overrides]]
filter = 'test(/(^(worktree|worktree_pool|worktree_cleanup|admin|mcp::handlers::(ci|dispatch_hook|force_release|worktree|p0b_tests)|daemon::(retention::worktrees|pr_state|auto_release|conflict_notify|per_tick::tmp_review_gc)|bootstrap::(agent_resolve|canonical_hygiene))::|checkout_repo_|dispatch_branch_skips_metadata_stub|send_with_branch_checkout_failure|task_done_cleans_post_lease|closes_markers_extract_cleanly_from_actual_main|resolve_sweep_boards_pairs_each_project_with_its_own_repo_2117_p2|shim_denies_agent_bypass_canonical_provisioning_2234|denylist_[a-z_]+_(2379|2390)|tracked_tree_[a-z_]+_2379|resolve_default_branch_base_[a-z_]+_2390)/)'
test-group = 'git-subprocess'
