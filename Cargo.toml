[package]
name = "agend-terminal"
version = "0.1.0"
edition = "2021"

[dependencies]
portable-pty = "0.8"
tokio = { version = "1", features = ["full"] }
nix = { version = "0.29", features = ["term", "signal", "process", "user"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
anyhow = "1"
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }
regex = "1"
serde_yaml = "0.9"
chrono = { version = "0.4", features = ["serde"] }
alacritty_terminal = "0.26"
