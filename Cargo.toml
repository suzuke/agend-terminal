[package]
name = "agend-terminal"
version = "0.3.0"
edition = "2021"
description = "Agent Process Manager — orchestrate AI coding agents with PTY isolation, fleet management, and 35 MCP tools"
license = "MIT"
repository = "https://github.com/suzuke/agend-terminal"
keywords = ["agent", "pty", "terminal", "mcp", "orchestration"]
categories = ["command-line-utilities", "development-tools"]

[lints.clippy]
unwrap_used = "deny"

[profile.release]
strip = true
lto = true

[dependencies]
# PTY
portable-pty = "0.9"

# Terminal
crossterm = "0.28"
alacritty_terminal = "0.26"
ratatui = "0.29"

# Concurrency
crossbeam = "0.8"

# Async (for Telegram + daemon UDS)
tokio = { version = "1", features = ["rt", "net", "io-util", "fs", "macros", "time"] }

# Serialization
serde = { version = "1", features = ["derive"] }
serde_json = "1"
serde_yaml = "0.9"

# Telegram
teloxide = { version = "0.13", features = ["macros"] }

# Utilities
anyhow = "1"
nix = { version = "0.29", features = ["term", "signal", "process", "user", "fs"] }
regex = "1"
chrono = { version = "0.4", features = ["serde"] }
cron = "0.15"
ctrlc = "3"
reqwest = { version = "0.12", features = ["json"] }
clap = { version = "4", features = ["derive"] }
clap_complete = "4"
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter", "local-time"] }
arboard = "3.6.1"
unicode-width = "0.2"
