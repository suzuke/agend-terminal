  # ── Stage 2b PermissionPrompt recordings (2026-04-20) ───────────────
  # Both recordings verified a real permission dialog appearing — claude
  # showed "User rejected write to..." after Deny, codex showed
  # "✗ You canceled the request to run printf 'hello' > ..." for a path
  # outside its workspace-write sandbox. Neither observed transition
  # sequence contains AgentState::PermissionPrompt: each backend's
  # permission pattern fails to match the actual dialog wording. Gap is
  # tracked in docs/archived/FOLLOWUP-permission-pattern-gaps.md; treat these as
  # regression anchors per Stage 2a convention.

  - file: claude-perm.raw
    backend: claude-code
    cli_version: "2.1.98"
    recorded_on: "2026-04-20"
    scenario: "prompt 'write hello to /tmp/claude-perm-test.txt' -> Allow-once/Deny dialog appears -> Deny -> /exit (final screen shows `⏺ Write(...)` banner + `User rejected write to ...`)"
    # PermissionPrompt now fires at byte ~9216 via the expanded
    # claude pattern that matches the actual 2.1.98 dialog wording
    # (`Esc to cancel · Tab to amend` footer plus `Do you want to …`
    # question). On the final frame the dialog has been dismissed and
    # only the `⏺ Write(...)` rejection banner remains.
    #
    # #1005 Phase A1 shift: `⏺ Write(...)` is the COMPLETION-banner
    # form (bare verb after `⏺`) which the post-#1005 ToolUse pattern
    # explicitly excludes — only `⏺ Writing` (-ing verb) fires ToolUse
    # for in-flight runs. Final detect() shifted from tool_use → idle
    # because the `❯` prompt glyph also matches on the final screen.
    # The tracker retains PermissionPrompt via hysteresis (byte-level
    # replay never crosses the min_hold) — no behavioral change for
    # consumers.
    #
    # #1541: a `thinking` phase now appears before `permission`. The spinner
    # verb here is `Swooping` (`✢ Swooping…`) — unlisted in the old verb
    # whitelist, so the agent's thinking was previously invisible. The
    # verb-agnostic structural anchor detects it; PermissionPrompt (priority
    # 8) then correctly overrides the latched Thinking (6).
    expected_transitions: [starting, idle, thinking, permission]
    expected_final_state: permission
    expected_final_detect: idle

