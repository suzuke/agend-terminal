# State-detection replay fixtures.
#
# Each entry records a real PTY session captured from a specific CLI
# version. The integration test at tests/state_replay.rs feeds the raw
# bytes through vterm + StateTracker and asserts the observed transition
# sequence matches `expected_transitions` exactly.
#
# Why version matters: patterns detect literal strings ("esc to cancel",
# "Type your message", etc.) which change across CLI versions. When a
# recording stops matching, the failure message must carry the original
# version so the debugger knows whether it's a pattern regression or an
# upstream UI change. Do not silently re-record against a newer version
# without bumping `cli_version` and `recorded_on`.
#
# Recording protocol:
#   script -q /tmp/<backend>-session.raw <cli-command>
#   # interact: trigger thinking, let it complete, exit
# Then copy into this directory and add a manifest entry.

fixtures:
  - file: claude-thinking.raw
    backend: claude-code
    cli_version: "2.1.98"
    recorded_on: "2026-04-20"
    scenario: "startup banner to idle prompt; response completes inline"
    expected_transitions: [starting, idle]
    expected_final_state: idle
    expected_final_detect: idle

  - file: codex-thinking.raw
    backend: codex
    cli_version: "0.120.0"
    recorded_on: "2026-04-20"
    scenario: "startup hits structural Press-Enter prompt, user was at usage limit"
    # Sprint 46: codex InteractivePrompt regex removed (false-positive on
    # idle `›` prompt). Without the pattern, the `›` prompt fires Idle,
    # then Thinking from the working spinner, then UsageLimit from the
    # quota-exceeded banner.
    expected_transitions: [starting, idle, thinking, usage_limit]
    expected_final_state: usage_limit
    expected_final_detect: usage_limit

  - file: codex-update.raw
    backend: codex
    cli_version: "0.120.0"
    recorded_on: "2026-04-20"
    scenario: "startup with Update available! menu, dismissed, then short prompt + response"
    # Sprint 46: codex InteractivePrompt regex removed (false-positive on
    # idle `›` prompt). Without the pattern, the `›` prompt fires Idle,
    # then the working spinner fires Thinking. Final detect() returns
    # Idle because the `› ` prompt glyph is visible on the final grid.
    expected_transitions: [starting, idle, thinking]
    expected_final_state: thinking
    expected_final_detect: idle

  - file: gemini-thinking.raw
    backend: gemini
    cli_version: "0.38.2"
    recorded_on: "2026-04-19"
    scenario: "startup → ready → idle prompt → thinking (recording cut mid-response)"
    expected_transitions: [starting, ready, idle, thinking]
    expected_final_state: thinking
    # Final detect is None because the spinner token cleared off screen
    # but Thinking remains latched — Phase 1c's LATCHED_STATE_EXPIRY
    # fallback (30s) would drop it back to Ready in production.
    expected_final_detect: null

  - file: kiro-thinking.raw
    backend: kiro-cli
    cli_version: "2.0.1"
    recorded_on: "2026-04-20"
    scenario: "startup splash → idle prompt → thinking (recording cut mid-response)"
    expected_transitions: [starting, idle, thinking]
    expected_final_state: thinking
    # detect() sees Ready on the final screen but hysteresis blocks the
    # immediate downgrade (Thinking held < 2s min_hold at cut time).
    expected_final_detect: ready

  - file: opencode-thinking.raw
    backend: opencode
    cli_version: "1.4.0"
    recorded_on: "2026-04-19"
    scenario: "startup → idle prompt → thinking (recording cut mid-response)"
    expected_transitions: [starting, idle, thinking]
    expected_final_state: thinking
    expected_final_detect: null

  # ── Stage 2b PermissionPrompt recordings (2026-04-20) ───────────────
  # Both recordings verified a real permission dialog appearing — claude
  # showed "User rejected write to..." after Deny, codex showed
  # "✗ You canceled the request to run printf 'hello' > ..." for a path
  # outside its workspace-write sandbox. Neither observed transition
  # sequence contains AgentState::PermissionPrompt: each backend's
  # permission pattern fails to match the actual dialog wording. Gap is
  # tracked in docs/archived/FOLLOWUP-permission-pattern-gaps.md; treat these as
  # regression anchors per Stage 2a convention.

  - file: claude-perm.raw
    backend: claude-code
    cli_version: "2.1.98"
    recorded_on: "2026-04-20"
    scenario: "prompt 'write hello to /tmp/claude-perm-test.txt' -> Allow-once/Deny dialog appears -> Deny -> /exit (final screen shows `⏺ Write(...)` banner + `User rejected write to ...`)"
    # PermissionPrompt now fires at byte ~9216 via the expanded
    # claude pattern that matches the actual 2.1.98 dialog wording
    # (`Esc to cancel · Tab to amend` footer plus `Do you want to …`
    # question). On the final frame the dialog has been dismissed and
    # only the `⏺ Write(...)` rejection banner remains — detect()
    # returns ToolUse, but the tracker retains PermissionPrompt (prio
    # 8) via hysteresis because byte-level replay never crosses the
    # 2s min_hold required to downgrade to ToolUse (prio 5).
    expected_transitions: [starting, idle, permission]
    expected_final_state: permission
    expected_final_detect: tool_use

  - file: codex-perm.raw
    backend: codex
    cli_version: "0.120.0"
    recorded_on: "2026-04-20"
    scenario: "prompt 'write hello to /Users/suzuke/codex-perm-test.txt' (path outside default workspace-write sandbox) -> codex requests approval to run an escalated command -> user cancels -> /exit"
    # Sprint 46: codex InteractivePrompt regex removed (false-positive on
    # idle `›` prompt). Without the pattern, the `›` prompt fires Idle,
    # then Thinking from the working spinner, then PermissionPrompt from
    # the approval dialog. After the user cancels, the dialog disappears
    # and the post-cancel frame shows `• Ran printf ...` / `└ (no output)`,
    # which the Codex ToolUse pattern matches — hence detect()=tool_use on
    # the final screen. The tracker retains PermissionPrompt via
    # hysteresis (byte-level replay cannot cross the 2s/5s min_hold
    # needed to downgrade from prio 8 to prio 5).
    expected_transitions: [starting, idle, thinking, permission]
    expected_final_state: permission
    expected_final_detect: tool_use

  # ── Stage 2a ToolUse recordings (2026-04-20) ────────────────────────
  # Every recording below DID exercise a real tool call (verified by
  # final-screen tool banners / session summaries), yet none of the
  # observed transition sequences contain AgentState::ToolUse. Each
  # fixture therefore documents a *pattern coverage gap*, tracked in
  # docs/archived/FOLLOWUP-tooluse-pattern-gaps.md. Treat these as regression
  # anchors: if a future pattern change starts firing ToolUse on one
  # of these fixtures the transitions array will diverge and this
  # test will flag it for manual review.

  - file: claude-tooluse.raw
    backend: claude-code
    cli_version: "2.1.98"
    recorded_on: "2026-04-20"
    scenario: "prompt 'list files in current directory' -> claude runs a tool and prints a directory listing under the ⏺ banner -> /exit"
    # Mid-stream banner `⏺ Listing 1 directory…` fires ToolUse at byte
    # ~9728 after the pattern alternation was extended to include the
    # claude 2.1.98 -ing verbs (Listing|Reading|Writing|Searching|
    # Editing). Final detect() returns Idle because the completion
    # frame shows the bare directory listing under `⏺` without a verb
    # on the banner line, so only the `❯` prompt glyph matches — the
    # tracker still reports ToolUse via hysteresis (min_hold=2s not
    # yet elapsed under byte-level replay).
    expected_transitions: [starting, idle, tool_use]
    expected_final_state: tool_use
    expected_final_detect: idle

  - file: codex-tooluse.raw
    backend: codex
    cli_version: "0.120.0"
    recorded_on: "2026-04-20"
    scenario: "prompt 'read the README.md file' -> codex reads + summarizes -> /exit (recording tail shows the `/exit` slash-command autocomplete menu)"
    # Sprint 46: codex InteractivePrompt regex removed (false-positive on
    # idle `›` prompt). Without the pattern, the `›` prompt fires Idle,
    # then Thinking from the working spinner. Hysteresis blocks the
    # downgrade under byte-level replay. Final detect() returns None
    # because the tool-block lines scroll off the visible tail by the
    # final frame (only the `Token usage:` / `resume ...` summary lines
    # remain).
    expected_transitions: [starting, idle, thinking]
    expected_final_state: thinking
    expected_final_detect: null

  - file: gemini-tooluse.raw
    backend: gemini
    cli_version: "0.38.2"
    recorded_on: "2026-04-20"
    scenario: "--yolo mode; prompt 'read package.json' -> gemini reads + replies -> /quit (session summary shows `Tool Calls: 1 ✓ 1`)"
    # Gemini 0.38.2 in-flight tool banner `✓ ReadFile Cargo.toml` is
    # now covered by an expanded ToolUse alternation, verified by the
    # gemini_tooluse_banner_match unit test. Transition sequence
    # unchanged: the spinner line (`⠦ Thinking... esc to cancel`)
    # fires at byte ~16384 — well before the first `✓ ReadFile`
    # banner at ~143360; Thinking (prio 6) > ToolUse (prio 5) and
    # byte-level replay never crosses the 2s min_hold. Production
    # reads between PTY chunks clear the hold and the transition
    # does surface. Final detect() shifted from null → tool_use
    # because the `✓ ReadFile Cargo.toml` line is still above the
    # exit summary box on the final 40-row grid.
    expected_transitions: [starting, ready, idle, thinking]
    expected_final_state: thinking
    expected_final_detect: tool_use

  - file: kiro-tooluse.raw
    backend: kiro-cli
    cli_version: "2.0.1"
    recorded_on: "2026-04-20"
    scenario: "--trust-all-tools mode; prompt 'list files in current directory' -> kiro runs tool + prints directory listing -> /quit"
    # Kiro 2.0.1 tool banner `● Read .` (U+25CF + capitalized verb) is
    # now covered by an updated ToolUse alternation, verified by the
    # kiro_tooluse_banner_match unit test. Replay baseline unchanged
    # because the `Thinking` spinner (prio Thinking=6) fires at byte
    # ~25088 before the first `● Read` banner at ~40960 (prio ToolUse
    # =5); hysteresis blocks the downgrade under byte-level replay
    # where elapsed time does not cross the 2s min_hold. Production
    # reads between PTY chunks clear the hold and the transition does
    # surface. Detect() returns Ready at the end because the final
    # screen still shows the "Trust All Tools active · /quit to exit"
    # status line.
    expected_transitions: [starting, idle, thinking]
    expected_final_state: thinking
    expected_final_detect: ready

  - file: opencode-tooluse.raw
    backend: opencode
    cli_version: "1.4.0"
    recorded_on: "2026-04-20"
    scenario: "prompt 'read README.md' -> opencode reads + replies -> /exit (recording ends on the opencode session-exit ASCII banner)"
    # OpenCode 1.4.0 tool banner format (`✱ Glob ...`, `→ Read ...`) is
    # now covered by a dedicated ToolUse pattern in Backend::OpenCode,
    # verified by the opencode_tooluse_banner_match unit test. Replay
    # baseline is unchanged because the `esc interrupt` spinner (prio
    # Thinking=6) fires at byte ~11264 before the first `✱ Glob`
    # banner at byte ~30720 (prio ToolUse=5); hysteresis blocks the
    # downgrade under byte-level replay where elapsed time does not
    # cross the 2s min_hold. In production the hold elapses between
    # PTY reads so tool banners do surface — the unit test anchors
    # the pattern against drift.
    expected_transitions: [starting, idle, thinking]
    expected_final_state: thinking
    expected_final_detect: null
