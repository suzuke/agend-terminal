name: CI

on:
  push:
    branches: [main, worktree-windows-port-phase-c]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  check:
    name: Check (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2

      - name: Format check
        run: cargo fmt --check

      - name: Clippy
        run: cargo clippy -- -D warnings

      - name: Build
        run: cargo build --release

      - name: Unit tests
        run: cargo test --bin agend-terminal

      - name: Integration tests
        run: cargo test --test integration

      - name: Upload binary (Unix)
        if: runner.os != 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: agend-terminal-${{ runner.os }}-${{ runner.arch }}
          path: target/release/agend-terminal
          retention-days: 14

      - name: Upload binary (Windows)
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: agend-terminal-${{ runner.os }}-${{ runner.arch }}
          path: target/release/agend-terminal.exe
          retention-days: 14
