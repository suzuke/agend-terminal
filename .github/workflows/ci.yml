name: CI

on:
  push:
    branches: [main, worktree-windows-port-phase-c]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

# Sprint 47 P1: cancel superseded PR runs; main pushes run to completion.
concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  check:
    name: Check (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      # #772 v3 (root-cause prevention): Swatinem/rust-cache@v2 by
      # default caches `~/.cargo/bin/` along with the rest of cargo
      # state. The cache write occasionally captures a stale
      # `rustup-init` shim at proxy paths (cargo, rustc, rustfmt,
      # clippy-driver); subsequent restores then overwrite the freshly-
      # installed dtolnay rustup proxies with that stale shim. Symptom
      # is `cargo fmt → unexpected argument 'fmt' found / Usage:
      # rustup-init` (signature documented across PRs #796, #799, #800).
      #
      # v1 (PR #796): post-cache bootstrap step relying on exit codes —
      # bypassed because `rustup-init --version` returns exit 0.
      # v2 (PR #800 r0): content-validating detect+recover — detection
      # confirmed staleness on all 3 platforms (universal cache pollution,
      # not macos-specific!), but recovery failed (`rustup default` does
      # not regenerate deleted proxies in ~/.cargo/bin/).
      # v3 (this commit): don't enter the bad state in the first place.
      # `cache-bin: false` tells Swatinem/rust-cache@v2 to exclude
      # `~/.cargo/bin/` from the cache. dtolnay/rust-toolchain@stable
      # then installs fresh proxies every run. Cost: ~1MB cache miss
      # and ~5-10s install per run, negligible vs the detect+recover
      # logic v2 attempted to maintain.
      - uses: Swatinem/rust-cache@v2
        with:
          cache-bin: false

      # tray-icon / tao on Linux link against GTK3 + the ayatana app-
      # indicator — these come from `libgtk-3-dev` (provides glib-2.0.pc,
      # gobject-2.0.pc, etc.) and `libayatana-appindicator3-dev`. The
      # runner image does NOT ship them by default, so the `Clippy (tray
      # feature)` step fails in gobject-sys' build script on a cache
      # miss. Pin to Linux only — macOS + Windows use native APIs.
      - name: Install Linux tray deps
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libayatana-appindicator3-dev libxdo-dev

      - name: Format check
        timeout-minutes: 5
        run: cargo fmt --check

      # Single clippy pass with --all-targets --features tray is a superset
      # of the default-feature check — catches both default and tray code
      # paths in one compilation, saving a full rebuild.
      - name: Clippy (all targets + tray)
        timeout-minutes: 15
        run: cargo clippy --all-targets --features tray -- -D warnings

      - name: Build
        timeout-minutes: 20
        run: cargo build --release

      # #1478: the discord feature is not in the default/tray build, so nothing
      # else type-checks it — the twilight version-split that broke
      # `--features discord` (twilight-model 0.17 vs gateway/http 0.16) rode
      # along invisibly, and the #1476/#1477 discord block_on fixes couldn't be
      # CI-verified. `cargo check` (type-check only, no codegen) is enough to
      # catch dep/API breakage and is fast. Linux-only — the conflict is
      # platform-independent.
      - name: Discord feature compiles (#1478)
        if: runner.os == 'Linux'
        timeout-minutes: 15
        run: cargo check --features discord --quiet

      # Runs unit tests (--bin) + every tests/*.rs integration file with the
      # tray feature, via nextest on ALL platforms.
      # #1784: a real `Command::new("git")` test (worktree_cleanup / branch_sweep
      # build real repos + worktrees) intermittently HANGS, timing the whole job
      # out at ~30min with NO culprit — `cargo test` only prints a test name on
      # COMPLETION, so a hung test is anonymous and the step never finalizes.
      # #1893: previously only windows ran nextest (mac/ubuntu used `cargo test`,
      # so a hung test there ran to the 30-min STEP timeout, anonymous). Now ALL
      # platforms run nextest with the `ci` profile's per-test terminate-after
      # (.config/nextest.toml): parallelism is kept, but a test still running past
      # the slow-timeout is KILLED and NAMED → a fast, attributed failure instead
      # of a 30-min mystery. The `ci` profile also serializes the heavy real-git
      # test cluster (`git-subprocess` test-group) so it can't race the suite.
      - name: Install nextest (#1784/#1893 — per-test terminate-after, all platforms)
        uses: taiki-e/install-action@v2
        with:
          tool: nextest

      - name: Tests (unit + integration + tray) [nextest — names a hung test, #1784/#1893]
        timeout-minutes: 30
        env:
          AGEND_LOCK_AUDIT: "1"
        run: cargo nextest run --features tray --profile ci

      - name: CLI smoke (Phase C.5)
        timeout-minutes: 10
        shell: bash
        env:
          AGEND_HOME: ${{ runner.temp }}/agend-smoke
        run: |
          set -eu
          if [ "$RUNNER_OS" = "Windows" ]; then
            BIN="./target/release/agend-terminal.exe"
            SHELL_CMD="cmd.exe"
          else
            BIN="./target/release/agend-terminal"
            SHELL_CMD="/bin/bash"
          fi

          rm -rf "$AGEND_HOME"
          mkdir -p "$AGEND_HOME"

          # Binary invokes at all
          "$BIN" --version

          # Spawn daemon in background with one shell agent.
          # Wave 1 CLI consolidation: `daemon` subcommand was removed;
          # `start --agents <NAME:CMD>...` is the canonical replacement.
          "$BIN" start --agents "shell:$SHELL_CMD" > daemon.log 2>&1 &
          DAEMON_PID=$!

          # #922: poll for `.ready` instead of `api.port`. `api.port` is
          # published BEFORE the agent spawn loop (#906 reorder), so
          # external probers seeing it cannot assume the registry is
          # populated. `.ready` is the daemon-init-complete signal —
          # spawn loop done, agent count final. Wait up to 30s.
          for i in $(seq 1 60); do
            if find "$AGEND_HOME/run" -name .ready 2>/dev/null | grep -q .; then
              echo "daemon ready (iter $i)"
              break
            fi
            if ! kill -0 $DAEMON_PID 2>/dev/null; then
              echo "daemon died during startup"
              cat daemon.log
              exit 1
            fi
            sleep 0.5
          done

          # List — must include the shell agent. Defense-in-depth retry
          # budget (3× 100ms) in case `.ready` is observed slightly
          # before the list IPC sees the final registry on a slow runner.
          # The actual contract is `.ready ⟹ count is final`, so the
          # retries should never fire in healthy CI — they are a safety
          # net against future regressions of the daemon-side contract.
          shell_visible=0
          for attempt in 1 2 3; do
            "$BIN" list --json | tee list.out
            if grep -q '"shell"' list.out; then
              shell_visible=1
              break
            fi
            sleep 0.1
          done
          if [ "$shell_visible" -ne 1 ]; then
            echo "shell agent missing from list after 3 retries"
            exit 1
          fi

          # Inject
          "$BIN" inject shell 'echo hi'

          # Clean shutdown
          "$BIN" stop

          # Wait up to 20s for daemon to exit (saw ~10s on a local macOS run;
          # Windows runners are slower, leave headroom).
          for i in $(seq 1 40); do
            if ! kill -0 $DAEMON_PID 2>/dev/null; then
              echo "daemon exited cleanly"
              break
            fi
            sleep 0.5
          done

          echo "=== daemon log ==="
          cat daemon.log || true

      - name: Upload binary (Unix)
        timeout-minutes: 5
        if: runner.os != 'Windows'
        uses: actions/upload-artifact@v5
        with:
          name: agend-terminal-${{ runner.os }}-${{ runner.arch }}
          path: target/release/agend-terminal
          retention-days: 14

      - name: Upload binary (Windows)
        timeout-minutes: 5
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v5
        with:
          name: agend-terminal-${{ runner.os }}-${{ runner.arch }}
          path: target/release/agend-terminal.exe
          retention-days: 14

  audit:
    runs-on: ubuntu-latest
    # rustsec/audit-check@v2 POSTs results to /repos/.../check-runs to surface
    # advisories on the PR/commit UI. Repo default `default_workflow_permissions:
    # read` denied that POST with "Resource not accessible by integration" on
    # every push-to-main since 2026-05-15 (audit was effectively running but its
    # last reporting step failed, making main CI red). `contents: read` keeps
    # actions/checkout working after the grant narrows the default scope.
    permissions:
      contents: read
      checks: write
      issues: write
    steps:
      - uses: actions/checkout@v4
      - uses: rustsec/audit-check@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

  # #686 (F11): maintainer-side QA infrastructure. Runs cargo-llvm-cov on
  # Ubuntu only (cross-platform consistency comes from `check` job; coverage
  # of *what code is exercised* is platform-independent), uploads lcov report
  # to Codecov. `fail_ci_if_error: false` keeps PR mergeable when codecov.io
  # is unreachable or unconfigured — coverage is observation infra, not a
  # blocking gate. Linux tray deps installed for parity with `check` job so
  # the same `--features tray` compilation surface is measured.
  #
  # End-user impact: ZERO — coverage is maintainer-side QA. `cargo install
  # agend-terminal` and running the fleet do not touch codecov.
  coverage:
    name: Coverage
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview
      - uses: Swatinem/rust-cache@v2
        with:
          cache-bin: false
      - name: Install Linux tray deps
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libayatana-appindicator3-dev libxdo-dev
      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@cargo-llvm-cov
      - name: Run coverage
        timeout-minutes: 35
        env:
          AGEND_LOCK_AUDIT: "1"
        # #1452: Coverage (non-required) can flake on transient llvm-profdata
        # profraw corruption under llvm-cov's slow parallel run — that passes on a
        # clean rerun, so retry once.
        #
        # SMART RETRY: a plain `test ... FAILED` is a REAL, deterministic failure.
        # The old loop retried it unconditionally AND labelled it "likely flake" —
        # which wasted a second slow coverage run and, worse, MASKED real bugs as
        # flakes (e.g. #1735's block_on invariant surfaced here and was dismissed
        # as a Coverage flake). So: only retry when the failure carries an
        # llvm-cov profraw/profdata-corruption signature; otherwise fail FAST with
        # an honest label so the real `test ... FAILED` is trusted, not ignored.
        run: |
          set -o pipefail
          attempt=1
          while :; do
            if cargo llvm-cov --workspace --tests --features tray --lcov --output-path coverage.lcov 2>&1 | tee cov-attempt.log; then
              exit 0
            fi
            if [ "$attempt" -ge 2 ]; then
              echo "::error::coverage failed again after retrying the profraw flake"
              exit 1
            fi
            if grep -qiE 'profdata|\.profraw|malformed instrumentation|raw profile|invalid instrumentation profile|failed to (load|merge).*profile|no profile can be merged' cov-attempt.log; then
              echo "::warning::coverage attempt $attempt hit an llvm-cov profraw/profdata corruption flake; cleaning + retrying once"
              cargo llvm-cov clean --workspace || true
              attempt=$((attempt + 1))
              continue
            fi
            echo "::error::coverage failed with a REAL test failure (no profraw-corruption signature) — NOT a flake; failing fast. See the 'test ... FAILED' above."
            exit 1
          done
      - name: Upload to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: coverage.lcov
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}
