name: CI

on:
  push:
    branches: [main, worktree-windows-port-phase-c]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

# Sprint 47 P1: cancel superseded PR runs; main pushes run to completion.
concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  check:
    name: Check (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      # #772 v2 (replaces v1 from PR #796): content-validating proxy check
      # with auto-invalidation. v1 bootstrap step (`rustup show && rustc
      # --version && cargo --version`) relied on EXIT CODES — but the
      # stale `rustup-init` binary in `~/.cargo/bin/cargo` responds to
      # `--version` with `rustup-init 1.29.0` exit-0, defeating the
      # check. PR #799's macos saga (3 reruns over ~3hr) confirmed the
      # detection gap.
      #
      # v2 validates output CONTENT (must start with the tool's own name)
      # for ALL 4 proxies the workflow invokes (cargo + rustc + rustfmt +
      # clippy-driver) and auto-invalidates stale cache binaries when
      # mismatch detected. `LC_ALL=C` reduces locale-format risk.
      # `shell: bash` required — for-loop syntax is bash-only and
      # windows-latest defaults to PowerShell.
      #
      # On recovery: surgical 6-binary `rm` preserves `rustup` itself
      # (so we can re-install). After `rustup default stable` + component
      # add, `rustup show` forces proxy refresh. Final invariant loop
      # hard-fails if any proxy is still broken.
      #
      # DO NOT remove or move before rust-cache without addressing #772
      # root cause (cache-overwrite of toolchain binaries).
      - name: Force toolchain bootstrap (mitigates macOS rustup-init transient #772 v2)
        shell: bash
        run: |
          needs_recovery=0
          for tool in cargo rustc rustfmt clippy-driver; do
            if ! LC_ALL=C "$tool" --version 2>&1 | grep -qE "^${tool} [0-9]"; then
              echo "::warning::Stale binary at ~/.cargo/bin/$tool ($(LC_ALL=C "$tool" --version 2>&1 | head -1)); will invalidate"
              needs_recovery=1
            fi
          done
          if [ "$needs_recovery" = "1" ]; then
            rm -rf ~/.cargo/bin/cargo ~/.cargo/bin/rustc ~/.cargo/bin/rustfmt ~/.cargo/bin/clippy-driver ~/.cargo/bin/cargo-fmt ~/.cargo/bin/cargo-clippy
            rustup default stable
            rustup component add rustfmt clippy
            rustup show
          fi
          for tool in cargo rustc rustfmt clippy-driver; do
            LC_ALL=C "$tool" --version 2>&1 | grep -qE "^${tool} [0-9]" \
              || { echo "::error::$tool proxy still broken after recovery: $(LC_ALL=C "$tool" --version 2>&1 | head -1)"; exit 1; }
          done

      # tray-icon / tao on Linux link against GTK3 + the ayatana app-
      # indicator — these come from `libgtk-3-dev` (provides glib-2.0.pc,
      # gobject-2.0.pc, etc.) and `libayatana-appindicator3-dev`. The
      # runner image does NOT ship them by default, so the `Clippy (tray
      # feature)` step fails in gobject-sys' build script on a cache
      # miss. Pin to Linux only — macOS + Windows use native APIs.
      - name: Install Linux tray deps
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libayatana-appindicator3-dev libxdo-dev

      - name: Format check
        timeout-minutes: 5
        run: cargo fmt --check

      # Single clippy pass with --all-targets --features tray is a superset
      # of the default-feature check — catches both default and tray code
      # paths in one compilation, saving a full rebuild.
      - name: Clippy (all targets + tray)
        timeout-minutes: 15
        run: cargo clippy --all-targets --features tray -- -D warnings

      - name: Build
        timeout-minutes: 20
        run: cargo build --release

      # `--tests` covers unit tests (--bin) + every tests/*.rs integration
      # file. `--features tray` ensures tray-gated code is tested too.
      # Previously this was 3 separate steps (unit, unit+tray, integration)
      # which triggered 2 extra recompilations from feature-flag switching.
      - name: Tests (unit + integration + tray)
        timeout-minutes: 30
        env:
          AGEND_LOCK_AUDIT: "1"
        run: cargo test --tests --features tray

      - name: CLI smoke (Phase C.5)
        timeout-minutes: 10
        shell: bash
        env:
          AGEND_HOME: ${{ runner.temp }}/agend-smoke
        run: |
          set -eu
          if [ "$RUNNER_OS" = "Windows" ]; then
            BIN="./target/release/agend-terminal.exe"
            SHELL_CMD="cmd.exe"
          else
            BIN="./target/release/agend-terminal"
            SHELL_CMD="/bin/bash"
          fi

          rm -rf "$AGEND_HOME"
          mkdir -p "$AGEND_HOME"

          # Binary invokes at all
          "$BIN" --version

          # Spawn daemon in background with one shell agent.
          # Wave 1 CLI consolidation: `daemon` subcommand was removed;
          # `start --agents <NAME:CMD>...` is the canonical replacement.
          "$BIN" start --agents "shell:$SHELL_CMD" > daemon.log 2>&1 &
          DAEMON_PID=$!

          # Wait up to 30s for api.port to appear
          for i in $(seq 1 60); do
            if find "$AGEND_HOME/run" -name api.port 2>/dev/null | grep -q .; then
              echo "daemon ready (iter $i)"
              break
            fi
            if ! kill -0 $DAEMON_PID 2>/dev/null; then
              echo "daemon died during startup"
              cat daemon.log
              exit 1
            fi
            sleep 0.5
          done

          # List — must include the shell agent
          "$BIN" list --json | tee list.out
          grep -q '"shell"' list.out || { echo "shell agent missing from list"; exit 1; }

          # Inject
          "$BIN" inject shell 'echo hi'

          # Clean shutdown
          "$BIN" stop

          # Wait up to 20s for daemon to exit (saw ~10s on a local macOS run;
          # Windows runners are slower, leave headroom).
          for i in $(seq 1 40); do
            if ! kill -0 $DAEMON_PID 2>/dev/null; then
              echo "daemon exited cleanly"
              break
            fi
            sleep 0.5
          done

          echo "=== daemon log ==="
          cat daemon.log || true

      - name: Upload binary (Unix)
        timeout-minutes: 5
        if: runner.os != 'Windows'
        uses: actions/upload-artifact@v5
        with:
          name: agend-terminal-${{ runner.os }}-${{ runner.arch }}
          path: target/release/agend-terminal
          retention-days: 14

      - name: Upload binary (Windows)
        timeout-minutes: 5
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v5
        with:
          name: agend-terminal-${{ runner.os }}-${{ runner.arch }}
          path: target/release/agend-terminal.exe
          retention-days: 14

  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: rustsec/audit-check@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
