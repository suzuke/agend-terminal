name: CI

on:
  push:
    branches: [main, worktree-windows-port-phase-c]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

# Sprint 47 P1: cancel superseded PR runs; main pushes run to completion.
concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  check:
    name: Check (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      # #772 v3 (root-cause prevention): Swatinem/rust-cache@v2 by
      # default caches `~/.cargo/bin/` along with the rest of cargo
      # state. The cache write occasionally captures a stale
      # `rustup-init` shim at proxy paths (cargo, rustc, rustfmt,
      # clippy-driver); subsequent restores then overwrite the freshly-
      # installed dtolnay rustup proxies with that stale shim. Symptom
      # is `cargo fmt → unexpected argument 'fmt' found / Usage:
      # rustup-init` (signature documented across PRs #796, #799, #800).
      #
      # v1 (PR #796): post-cache bootstrap step relying on exit codes —
      # bypassed because `rustup-init --version` returns exit 0.
      # v2 (PR #800 r0): content-validating detect+recover — detection
      # confirmed staleness on all 3 platforms (universal cache pollution,
      # not macos-specific!), but recovery failed (`rustup default` does
      # not regenerate deleted proxies in ~/.cargo/bin/).
      # v3 (this commit): don't enter the bad state in the first place.
      # `cache-bin: false` tells Swatinem/rust-cache@v2 to exclude
      # `~/.cargo/bin/` from the cache. dtolnay/rust-toolchain@stable
      # then installs fresh proxies every run. Cost: ~1MB cache miss
      # and ~5-10s install per run, negligible vs the detect+recover
      # logic v2 attempted to maintain.
      - uses: Swatinem/rust-cache@v2
        with:
          cache-bin: false

      # tray-icon / tao on Linux link against GTK3 + the ayatana app-
      # indicator — these come from `libgtk-3-dev` (provides glib-2.0.pc,
      # gobject-2.0.pc, etc.) and `libayatana-appindicator3-dev`. The
      # runner image does NOT ship them by default, so the `Clippy (tray
      # feature)` step fails in gobject-sys' build script on a cache
      # miss. Pin to Linux only — macOS + Windows use native APIs.
      - name: Install Linux tray deps
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libayatana-appindicator3-dev libxdo-dev

      - name: Format check
        timeout-minutes: 5
        run: cargo fmt --check

      # Single clippy pass with --all-targets --features tray is a superset
      # of the default-feature check — catches both default and tray code
      # paths in one compilation, saving a full rebuild.
      - name: Clippy (all targets + tray)
        timeout-minutes: 15
        run: cargo clippy --all-targets --features tray -- -D warnings

      - name: Build
        timeout-minutes: 20
        run: cargo build --release

      # `--tests` covers unit tests (--bin) + every tests/*.rs integration
      # file. `--features tray` ensures tray-gated code is tested too.
      # Previously this was 3 separate steps (unit, unit+tray, integration)
      # which triggered 2 extra recompilations from feature-flag switching.
      - name: Tests (unit + integration + tray)
        timeout-minutes: 30
        env:
          AGEND_LOCK_AUDIT: "1"
        run: cargo test --tests --features tray

      - name: CLI smoke (Phase C.5)
        timeout-minutes: 10
        shell: bash
        env:
          AGEND_HOME: ${{ runner.temp }}/agend-smoke
        run: |
          set -eu
          if [ "$RUNNER_OS" = "Windows" ]; then
            BIN="./target/release/agend-terminal.exe"
            SHELL_CMD="cmd.exe"
          else
            BIN="./target/release/agend-terminal"
            SHELL_CMD="/bin/bash"
          fi

          rm -rf "$AGEND_HOME"
          mkdir -p "$AGEND_HOME"

          # Binary invokes at all
          "$BIN" --version

          # Spawn daemon in background with one shell agent.
          # Wave 1 CLI consolidation: `daemon` subcommand was removed;
          # `start --agents <NAME:CMD>...` is the canonical replacement.
          "$BIN" start --agents "shell:$SHELL_CMD" > daemon.log 2>&1 &
          DAEMON_PID=$!

          # Wait up to 30s for api.port to appear
          for i in $(seq 1 60); do
            if find "$AGEND_HOME/run" -name api.port 2>/dev/null | grep -q .; then
              echo "daemon ready (iter $i)"
              break
            fi
            if ! kill -0 $DAEMON_PID 2>/dev/null; then
              echo "daemon died during startup"
              cat daemon.log
              exit 1
            fi
            sleep 0.5
          done

          # List — must include the shell agent
          "$BIN" list --json | tee list.out
          grep -q '"shell"' list.out || { echo "shell agent missing from list"; exit 1; }

          # Inject
          "$BIN" inject shell 'echo hi'

          # Clean shutdown
          "$BIN" stop

          # Wait up to 20s for daemon to exit (saw ~10s on a local macOS run;
          # Windows runners are slower, leave headroom).
          for i in $(seq 1 40); do
            if ! kill -0 $DAEMON_PID 2>/dev/null; then
              echo "daemon exited cleanly"
              break
            fi
            sleep 0.5
          done

          echo "=== daemon log ==="
          cat daemon.log || true

      - name: Upload binary (Unix)
        timeout-minutes: 5
        if: runner.os != 'Windows'
        uses: actions/upload-artifact@v5
        with:
          name: agend-terminal-${{ runner.os }}-${{ runner.arch }}
          path: target/release/agend-terminal
          retention-days: 14

      - name: Upload binary (Windows)
        timeout-minutes: 5
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v5
        with:
          name: agend-terminal-${{ runner.os }}-${{ runner.arch }}
          path: target/release/agend-terminal.exe
          retention-days: 14

  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: rustsec/audit-check@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
