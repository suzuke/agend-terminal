name: Release

on:
  push:
    tags: ["v*"]
  # Manual trigger for pre-tag validation — release pipeline otherwise only
  # runs when a tag is cut, so bugs in this workflow surface late and loud.
  # Dispatched runs still upload artifacts but skip the `release` job because
  # softprops/action-gh-release only fires on tag refs.
  workflow_dispatch:

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  # Pre-release gate — every release artifact job `needs` this. Runs on BOTH
  # triggers so `workflow_dispatch` pre-tag validation keeps working (a
  # tag-only gate would skip and cascade-skip every `needs: gate` job); the
  # tag-coupled checks (version==tag, changelog section) are step-gated to
  # tag refs, while MSRV + semver-checks add value on dispatch runs too.
  gate:
    name: Pre-release gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          # cargo-semver-checks baselines against the previous tag.
          fetch-depth: 0

      - name: Version matches tag
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          set -euo pipefail
          TAG="${GITHUB_REF_NAME#v}"
          CARGO_VERSION="$(grep -m1 '^version = ' Cargo.toml | cut -d'"' -f2)"
          if [ "$TAG" != "$CARGO_VERSION" ]; then
            echo "::error::tag ${GITHUB_REF_NAME} does not match Cargo.toml version ${CARGO_VERSION} — bump Cargo.toml (and Cargo.lock via 'cargo update -w') before tagging"
            exit 1
          fi
          echo "version ok: ${CARGO_VERSION}"

      - name: Changelog section exists
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          set -euo pipefail
          TAG="${GITHUB_REF_NAME#v}"
          # Pre-release tags (vX.Y.Z-rc.N) gate on the base X.Y.Z section.
          BASE="${TAG%%-*}"
          if ! grep -qE "^## \[${BASE}\]" CHANGELOG.md; then
            echo "::error::CHANGELOG.md has no '## [${BASE}]' section — add the release notes before tagging"
            exit 1
          fi
          echo "changelog ok: [${BASE}]"

      # MSRV — Cargo.toml declares rust-version 1.88; the gate proves it
      # still compiles there (a dep bump silently raising MSRV fails HERE,
      # not on a user's machine). Default features only: `tray` needs GTK
      # dev libs and is exercised by the build matrix, not the gate.
      - name: Install MSRV toolchain (1.88)
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.88"
      - uses: Swatinem/rust-cache@v2
        with:
          key: gate-msrv-1.88
      - name: MSRV check (1.88)
        run: cargo +1.88 check --locked

      # SemVer report — SOFT-FAIL pre-1.0 (prints the report for the human
      # release decision; 0.x bump rules are understood by the tool). Promote
      # to hard-fail post-1.0. Baseline = previous git tag by deliberate
      # choice over the action's default (latest crates.io version):
      # self-contained, no dependency on crates.io availability, and the
      # git tag set is the more complete history (crates.io is missing
      # 0.3.2 / 0.4.0 / 0.6.1).
      - name: Determine semver baseline (previous tag)
        id: prev
        run: |
          set -euo pipefail
          PREV="$(git describe --tags --abbrev=0 "${GITHUB_SHA}^" 2>/dev/null || true)"
          echo "tag=${PREV}" >> "$GITHUB_OUTPUT"
          echo "semver baseline: ${PREV:-<none — skipping semver-checks>}"
      - name: cargo-semver-checks (soft-fail pre-1.0)
        if: steps.prev.outputs.tag != ''
        id: semver
        continue-on-error: true
        uses: obi1kenobi/cargo-semver-checks-action@v2
        with:
          baseline-rev: ${{ steps.prev.outputs.tag }}
          rust-toolchain: stable
      - name: SemVer soft-fail notice
        if: steps.semver.outcome == 'failure'
        run: |
          echo "::warning::cargo-semver-checks reported breaking changes — review the report above (soft-fail while pre-1.0)"
          echo "### cargo-semver-checks: REPORTED ISSUES (soft-fail pre-1.0) — see the gate job log" >> "$GITHUB_STEP_SUMMARY"

  build:
    name: Build (${{ matrix.target }})
    needs: gate
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # macOS — both targets build on macos-latest (arm64 host).
          # x86_64 is cross-compiled; deps are pure Rust / FFI-only so no
          # C toolchain needed. Avoids macos-13 Intel runner queue delays.
          # `tray` feature ships by default on macOS — `tray-icon` + `tao`
          # use Cocoa, no system-lib runtime surprises.
          - target: x86_64-apple-darwin
            os: macos-latest
            archive: tar.gz
            features: tray
          - target: aarch64-apple-darwin
            os: macos-latest
            archive: tar.gz
            features: tray
          # Linux — use native arm64 runner to avoid cross-compile pain with
          # native deps (arboard/x11). Free for public repos since 2025-01.
          # `tray` is NOT on the release tarball: tray-icon's Linux backend
          # dynamically links against libgtk-3 + libayatana-appindicator3,
          # so a GTK-on feature on a headless box would fail to load. Linux
          # users who want the tray use `cargo install agend-terminal
          # --features tray` (documented in the README).
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            archive: tar.gz
            features: ""
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-24.04-arm
            archive: tar.gz
            features: ""
          # Windows x64 — native shell APIs, `tray` on by default.
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            archive: zip
            features: tray
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}-${{ matrix.features }}

      - name: Build
        shell: bash
        run: |
          if [ -n "${{ matrix.features }}" ]; then
            cargo build --release --target ${{ matrix.target }} --features ${{ matrix.features }}
          else
            cargo build --release --target ${{ matrix.target }}
          fi

      - name: Package (Unix)
        if: matrix.archive == 'tar.gz'
        shell: bash
        run: |
          cd target/${{ matrix.target }}/release
          # Sprint 56 Track I-Phase2a (#531): bundle agend-mcp-bridge
          # alongside agend-terminal so backends spawned by the daemon's
          # mcp_config can find it next to the main binary. Without
          # this, mcp_config::bridge_binary_path falls back to
          # `agend-terminal mcp` and reply / react / download_attachment
          # land on the daemon-state-unreachable error path on Windows.
          tar czf ../../../agend-terminal-${{ matrix.target }}.tar.gz agend-terminal agend-mcp-bridge

      - name: Package (Windows)
        if: matrix.archive == 'zip'
        shell: pwsh
        run: |
          # Sprint 56 Track I-Phase2a (#531): same dual-binary packaging
          # as the Unix tar arm. PowerShell's Compress-Archive `-Path`
          # accepts a comma-separated array of file paths.
          Compress-Archive `
            -Path "target/${{ matrix.target }}/release/agend-terminal.exe","target/${{ matrix.target }}/release/agend-mcp-bridge.exe" `
            -DestinationPath agend-terminal-${{ matrix.target }}.zip

      - name: Upload artifact
        uses: actions/upload-artifact@v5
        with:
          name: agend-terminal-${{ matrix.target }}
          path: agend-terminal-${{ matrix.target }}.${{ matrix.archive }}

  appimage:
    name: Build AppImage (x86_64)
    needs: gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable

      # linuxdeploy + plugin-gtk need the same GTK dev libs the tray feature
      # needs at build time. imagemagick resizes the 1024x1024 master icon to
      # the 256x256 that the AppImage spec + FreeDesktop hicolor standard want.
      - name: Install build deps
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            libxdo-dev \
            imagemagick \
            wget \
            file \
            desktop-file-utils

      - uses: Swatinem/rust-cache@v2
        with:
          key: appimage-x86_64-tray

      - name: Build (release, --features tray)
        run: cargo build --release --features tray

      - name: Stage AppDir
        run: |
          set -euo pipefail
          mkdir -p AppDir/usr/bin
          mkdir -p AppDir/usr/share/applications
          mkdir -p AppDir/usr/share/icons/hicolor/256x256/apps
          cp target/release/agend-terminal AppDir/usr/bin/agend-terminal
          # Sprint 56 Track I-Phase2a (#531): ship the bridge binary
          # alongside the main one inside the AppImage. Same rationale
          # as the tar/zip arms above — without this, the AppImage
          # operators hit the same #531 fallback-to-`agend-terminal
          # mcp` failure mode for daemon-state-required tools.
          cp target/release/agend-mcp-bridge AppDir/usr/bin/agend-mcp-bridge
          cp assets/appimage/agend-terminal.desktop AppDir/usr/share/applications/agend-terminal.desktop
          # Resize 1024x1024 master → 256x256 for hicolor + AppImage root
          convert assets/appimage/agend-terminal.png -resize 256x256 AppDir/usr/share/icons/hicolor/256x256/apps/agend-terminal.png
          # linuxdeploy expects icon + .desktop at AppDir root too
          cp AppDir/usr/share/icons/hicolor/256x256/apps/agend-terminal.png AppDir/agend-terminal.png
          cp AppDir/usr/share/applications/agend-terminal.desktop AppDir/agend-terminal.desktop

      # Validate the staged copy — the one that actually goes into the
      # AppImage, not just the source file in assets/.
      - name: Validate .desktop
        run: desktop-file-validate AppDir/agend-terminal.desktop

      # Pin both tools + verify sha256. A release pipeline's trust boundary is
      # tighter than CI's — `continuous` + `master` are moving targets and any
      # upstream push (benign or not) lands directly in tagged artifacts.
      # Bump deliberately when upstream ships something we want.
      #
      # Linuxdeploy doesn't do proper semver releases; current tag convention
      # is `1-alpha-<YYYYMMDD>-N`. To bump:
      #   - latest tag: https://github.com/linuxdeploy/linuxdeploy/releases
      #   - asset digest: gh api repos/linuxdeploy/linuxdeploy/releases/tags/<tag>
      # plugin-gtk has no releases; pin by commit SHA from master history:
      #   https://github.com/linuxdeploy/linuxdeploy-plugin-gtk/commits/master
      - name: Download + verify linuxdeploy + plugin-gtk
        env:
          LINUXDEPLOY_TAG: "1-alpha-20251107-1"
          LINUXDEPLOY_SHA256: "c20cd71e3a4e3b80c3483cef793cda3f4e990aca14014d23c544ca3ce1270b4d"
          PLUGIN_GTK_SHA: "3b67a1d1c1b0c8268f57f2bce40fe2d33d409cea"
          PLUGIN_GTK_SHA256: "b0f4cbc684a0103a9651f0955b635eaea0096b3a66c0f5a2c2aa337960375171"
        run: |
          set -euo pipefail
          wget -q "https://github.com/linuxdeploy/linuxdeploy/releases/download/${LINUXDEPLOY_TAG}/linuxdeploy-x86_64.AppImage"
          wget -q "https://raw.githubusercontent.com/linuxdeploy/linuxdeploy-plugin-gtk/${PLUGIN_GTK_SHA}/linuxdeploy-plugin-gtk.sh"
          echo "${LINUXDEPLOY_SHA256}  linuxdeploy-x86_64.AppImage" | sha256sum -c -
          echo "${PLUGIN_GTK_SHA256}  linuxdeploy-plugin-gtk.sh" | sha256sum -c -
          chmod +x linuxdeploy-x86_64.AppImage linuxdeploy-plugin-gtk.sh

      # APPIMAGE_EXTRACT_AND_RUN bypasses FUSE — GitHub runners don't ship it.
      # OUTPUT pins the filename so the upload step + release files list match.
      # --custom-apprun installs our own AppRun that forces `tray` subcommand
      # when no args are passed (default AppRun ignores the .desktop `Exec=`,
      # so double-click would fall into help-and-exit interactive CLI mode).
      # Our AppRun still sources apprun-hooks/*.sh so GTK env from plugin-gtk
      # stays effective.
      - name: Build AppImage
        env:
          APPIMAGE_EXTRACT_AND_RUN: "1"
          OUTPUT: agend-terminal-x86_64.AppImage
        run: |
          chmod +x assets/appimage/AppRun
          ./linuxdeploy-x86_64.AppImage \
            --appdir AppDir \
            --plugin gtk \
            --custom-apprun assets/appimage/AppRun \
            --output appimage

      - name: Upload artifact
        uses: actions/upload-artifact@v5
        with:
          name: agend-terminal-x86_64-AppImage
          path: agend-terminal-x86_64.AppImage

  release:
    name: Create Release
    needs: [build, appimage]
    runs-on: ubuntu-latest
    # Only publish on tag pushes. workflow_dispatch runs still produce
    # artifacts (for pre-tag validation) but must not touch the release page.
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - uses: actions/download-artifact@v5
        with:
          path: artifacts
          merge-multiple: true

      - name: Generate SHA256 checksums
        run: |
          cd artifacts
          sha256sum agend-terminal-*.tar.gz agend-terminal-*.zip agend-terminal-*.AppImage > SHA256SUMS
          cat SHA256SUMS

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            artifacts/*.tar.gz
            artifacts/*.zip
            artifacts/*.AppImage
            artifacts/SHA256SUMS

  # crates.io publish — runs only after the GitHub Release succeeded, never
  # for pre-release tags (vX.Y.Z-rc.N). Gracefully SKIPS (green, annotated)
  # when the CRATES_IO_TOKEN secret is not configured yet — a missing token
  # must not redden an otherwise-good release.
  publish:
    name: Publish to crates.io
    needs: release
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/') && !contains(github.ref_name, '-')
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          key: publish

      - name: Publish (graceful skip without token)
        env:
          CRATES_IO_TOKEN: ${{ secrets.CRATES_IO_TOKEN }}
        run: |
          set -euo pipefail
          if [ -z "${CRATES_IO_TOKEN}" ]; then
            echo "::warning::CRATES_IO_TOKEN secret not configured — skipping crates.io publish"
            echo "### crates.io publish: SKIPPED — no CRATES_IO_TOKEN secret (see docs/RELEASING.md)" >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi
          cargo publish --dry-run --locked
          cargo publish --locked --token "${CRATES_IO_TOKEN}"
          echo "### crates.io publish: OK (${GITHUB_REF_NAME})" >> "$GITHUB_STEP_SUMMARY"
